<html lang="en">
  <head>
    <script>
      // Patch window.fetch with a proper setter to prevent TypeError in sandboxed environments or devtools that monkey-patch fetch.
      (function() {
        try {
          const originalFetch = window.fetch;
          if (originalFetch) {
            let currentFetch = originalFetch;
            Object.defineProperty(window, 'fetch', {
              get() {
                return currentFetch;
              },
              set(val) {
                currentFetch = val;
              },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.warn("Fetch patch configuration failed:", e);
        }
      })();
    </script>
